services:
  vue-app:
    image: tsenturion/vue-provide-inject-demo:latest
    build: .
    container_name: vue-provide-inject-demo
    ports:
      - "8080:80"
    restart: unless-stopped

  vue-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: vue-provide-inject-demo-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev -- --host 0.0.0.0
